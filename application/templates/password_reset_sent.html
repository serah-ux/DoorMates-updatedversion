<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | DoorMate</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      :root {
        --primary-blue: #2563eb;
        --dark-slate: #1e293b;
        --bg-light: #f1f5f9;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .reset-sent-card {
        background: white;
        width: 420px;
        border-radius: 20px;
        padding: 50px 40px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .icon-box {
        width: 70px;
        height: 70px;
        background: #eff6ff;
        color: var(--primary-blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin: 0 auto 25px;
      }

      .reset-sent-card h1 {
        color: var(--dark-slate);
        font-weight: 800;
        margin-bottom: 15px;
        font-size: 1.75rem;
      }

      .info-text {
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .expiry-alert {
        background: #fff7ed;
        color: #9a3412;
        padding: 10px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 600;
        border: 1px solid #ffedd5;
        margin-bottom: 30px;
      }

      .btn-back {
        display: block;
        width: 100%;
        background: var(--primary-blue);
        color: white;
        padding: 14px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        transition: 0.3s;
      }

      .btn-back:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }

      .resend-link {
        margin-top: 25px;
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .resend-link a {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>

    <div class="reset-sent-card">
      <div class="icon-box">
        <i class="bi bi-envelope-check"></i>
      </div>

      <h1>Check your inbox</h1>

      <p class="info-text">
        We've sent a password reset link to your email address. Please check your spam folder if you don't see it in a few minutes.
      </p>

      <div class="expiry-alert">
        <i class="bi bi-clock-history me-1"></i>
        The link expires in 10 minutes
      </div>

      <a href="{% url 'login' %}" class="btn-back">Return to Login</a>

      <div class="resend-link">
        Didn't receive the email? <a href="{% url 'forgot-password' %}">Try again</a>
      </div>
    </div>

  </body>
</html>
