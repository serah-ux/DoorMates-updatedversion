<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | DoorMate</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      :root {
        --primary-blue: #2563eb;
        --dark-slate: #1e293b;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .reset-card {
        background: white;
        width: 400px;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      }

      .reset-card h1 {
        text-align: center;
        color: var(--dark-slate);
        font-weight: 800;
        margin-bottom: 10px;
        font-size: 1.8rem;
      }

      .sub-text {
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      /* Message Styling */
      .message-box {
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 0.85rem;
      }
      .error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
      .success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

      /* Field Styling */
      .txt_field {
        position: relative;
        margin: 30px 0;
        border-bottom: 2px solid #e2e8f0;
      }

      .txt_field input {
        width: 100%;
        padding: 0 5px;
        height: 40px;
        font-size: 16px;
        border: none;
        background: none;
        outline: none;
      }

      .txt_field label {
        position: absolute;
        top: 50%;
        left: 5px;
        color: #94a3b8;
        transform: translateY(-50%);
        font-size: 16px;
        pointer-events: none;
        transition: .5s;
      }

      .txt_field span::before {
        content: '';
        position: absolute;
        top: 40px;
        left: 0;
        width: 0%;
        height: 2px;
        background: var(--primary-blue);
        transition: .5s;
      }

      .txt_field input:focus ~ label,
      .txt_field input:valid ~ label {
        top: -5px;
        color: var(--primary-blue);
        font-weight: 700;
        font-size: 13px;
      }

      .txt_field input:focus ~ span::before,
      .txt_field input:valid ~ span::before {
        width: 100%;
      }

      /* Button Styling */
      input[type="submit"] {
        width: 100%;
        height: 50px;
        border: none;
        background: var(--primary-blue);
        border-radius: 12px;
        font-size: 17px;
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: .3s;
      }

      input[type="submit"]:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }

      .signup_link {
        margin-top: 25px;
        text-align: center;
        font-size: 0.95rem;
        color: #64748b;
      }

      .signup_link a {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
      }

      .lock-icon {
        text-align: center;
        font-size: 2.5rem;
        color: var(--primary-blue);
        margin-bottom: 10px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>

    <div class="reset-card">
      <div class="lock-icon">
        <i class="bi bi-shield-lock"></i>
      </div>
      <h1>New Password</h1>
      <p class="sub-text">Please choose a strong password to secure your account.</p>

      {% if messages %}
          {% for message in messages %}
              <div class="message-box {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                  {{ message }}
              </div>
          {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="txt_field">
          <input type="password" required name="password">
          <span></span>
          <label>Enter New Password</label>
        </div>

        <div class="txt_field">
            <input type="password" required name="confirm_password">
            <span></span>
            <label>Confirm New Password</label>
        </div>

        <input type="submit" value="Update Password">

        <div class="signup_link">
          Changed your mind? <a href="{% url 'login' %}">Sign in</a>
        </div>
      </form>
    </div>

  </body>
</html>
