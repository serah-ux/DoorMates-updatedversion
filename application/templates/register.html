<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Registration | DoorMate</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --client-blue: #2563eb;
        --dark-slate: #1e293b;
      }

      body {
        margin: 0;
        padding: 20px 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .register-card {
        background: white;
        width: 450px;
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(0,0,0,0.05);
      }

      .register-card h1 {
        text-align: center;
        color: var(--dark-slate);
        font-weight: 800;
        margin-bottom: 5px;
        font-size: 1.8rem;
      }

      .sub-text {
        text-align: center;
        color: #64748b;
        font-size: 0.95rem;
        margin-bottom: 30px;
      }

      /* Alert Message Styling */
      .message-box {
        text-align: center;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 0.85rem;
      }
      .error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
      .success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

      /* Animated Field Styling */
      .txt_field {
        position: relative;
        margin: 25px 0;
        border-bottom: 2px solid #e2e8f0;
      }

      .txt_field input {
        width: 100%;
        padding: 0 5px;
        height: 40px;
        font-size: 16px;
        border: none;
        background: none;
        outline: none;
        color: var(--dark-slate);
      }

      .txt_field label {
        position: absolute;
        top: 50%;
        left: 5px;
        color: #94a3b8;
        transform: translateY(-50%);
        font-size: 15px;
        pointer-events: none;
        transition: all 0.3s ease;
      }

      .txt_field span::before {
        content: '';
        position: absolute;
        top: 40px;
        left: 0;
        width: 0%;
        height: 2px;
        background: var(--client-blue);
        transition: .3s;
      }

      .txt_field input:focus ~ label,
      .txt_field input:valid ~ label {
        top: -8px;
        color: var(--client-blue);
        font-weight: 700;
        font-size: 12px;
      }

      .txt_field input:focus ~ span::before,
      .txt_field input:valid ~ span::before {
        width: 100%;
      }

      /* Submit Button */
      input[type="submit"] {
        width: 100%;
        height: 55px;
        border: none;
        background: var(--client-blue);
        border-radius: 14px;
        font-size: 1.1rem;
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 15px;
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
      }

      input[type="submit"]:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
      }

      /* Link Footer */
      .signup_link {
        margin-top: 25px;
        text-align: center;
        font-size: 0.9rem;
        color: #64748b;
      }

      .signup_link a {
        color: var(--client-blue);
        text-decoration: none;
        font-weight: 700;
      }

      /* Inline Fields for Mobile-first Name Row */
      .name-row {
        display: flex;
        gap: 15px;
      }
      .name-row .txt_field {
        flex: 1;
      }
    </style>
  </head>
  <body>

    <div class="register-card">
      <h1>Join as a Client</h1>
      <p class="sub-text">Find the perfect professional for your needs.</p>

      {% if messages %}
          {% for message in messages %}
              <div class="message-box {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                  {{ message }}
              </div>
          {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="name-row">
            <div class="txt_field">
                <input type="text" required name="first_name">
                <span></span>
                <label>First Name</label>
            </div>
            <div class="txt_field">
                <input type="text" required name="last_name">
                <span></span>
                <label>Last Name</label>
            </div>
        </div>

        <div class="txt_field">
          <input type="text" required name="username">
          <span></span>
          <label>Username</label>
        </div>

        <div class="txt_field">
            <input type="email" required name="email">
            <span></span>
            <label>Email Address</label>
        </div>

        <div class="txt_field">
          <input type="password" required name="password">
          <span></span>
          <label>Create Password</label>
        </div>

        <input type="submit" value="Register Account">

        <div class="signup_link">
          Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
      </form>
    </div>

  </body>
</html>
