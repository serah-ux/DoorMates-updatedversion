<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DoorMate</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --primary-blue: #2563eb;
        --dark-slate: #1e293b;
        --bg-light: #f1f5f9;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        background: white;
        width: 400px;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      }

      .login-card h1 {
        text-align: center;
        color: var(--dark-slate);
        font-weight: 800;
        margin-bottom: 30px;
        font-size: 2rem;
      }

      /* Message Styling */
      .message-box {
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .error { background: #fee2e2; color: #dc2626; }
      .success { background: #dcfce7; color: #166534; }

      /* Field Styling */
      .txt_field {
        position: relative;
        margin: 30px 0;
        border-bottom: 2px solid #adadad;
      }

      .txt_field input {
        width: 100%;
        padding: 0 5px;
        height: 40px;
        font-size: 16px;
        border: none;
        background: none;
        outline: none;
      }

      .txt_field label {
        position: absolute;
        top: 50%;
        left: 5px;
        color: #adadad;
        transform: translateY(-50%);
        font-size: 16px;
        pointer-events: none;
        transition: .5s;
      }

      .txt_field span::before {
        content: '';
        position: absolute;
        top: 40px;
        left: 0;
        width: 0%;
        height: 2px;
        background: var(--primary-blue);
        transition: .5s;
      }

      .txt_field input:focus ~ label,
      .txt_field input:valid ~ label {
        top: -5px;
        color: var(--primary-blue);
        font-weight: 600;
      }

      .txt_field input:focus ~ span::before,
      .txt_field input:valid ~ span::before {
        width: 100%;
      }

      /* Button Styling */
      input[type="submit"] {
        width: 100%;
        height: 50px;
        border: 1px solid;
        background: var(--primary-blue);
        border-radius: 12px;
        font-size: 18px;
        color: white;
        font-weight: 700;
        cursor: pointer;
        outline: none;
        transition: .3s;
      }

      input[type="submit"]:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }

      /* Link Styling */
      .links-container {
        margin: 30px 0;
        text-align: center;
        font-size: 0.95rem;
        color: #64748b;
      }

      .links-container a {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
      }

      .links-container a:hover {
        text-decoration: underline;
      }

      .back-home {
        display: block;
        text-align: center;
        margin-top: 10px;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>

    <div class="login-card">
      <h1>DoorMate</h1>

      {% if messages %}
          {% for message in messages %}
              <div class="message-box {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                  {{ message }}
              </div>
          {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="txt_field">
          <input type="text" required name="username">
          <span></span>
          <label>Username</label>
        </div>

        <div class="txt_field">
          <input type="password" required name="password">
          <span></span>
          <label>Password</label>
        </div>

        <input type="submit" value="Login to Account">

        <div class="links-container">
          <div>Not a member? <a href="{% url 'register' %}">Sign up here</a></div>
          <div style="margin-top: 15px;">
            <a href="{% url 'forgot-password' %}">Forgot password?</a>
          </div>
          <a href="{% url 'index' %}" class="back-home">← Back to Homepage</a>
        </div>
      </form>
    </div>

  </body>
</html>
